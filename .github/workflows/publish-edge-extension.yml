name: Publish Edge Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-edge:
    name: Build, zip, and submit to Microsoft Edge Add-ons
    runs-on: ubuntu-latest

    env:
      EDGE_API_ROOT: https://api.addons.microsoftedge.microsoft.com

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive version from release tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,3}$ ]]; then
            echo "Invalid extension version: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set package and manifest versions
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION;

            for (const file of ['package.json', 'public/manifest.json']) {
              const json = JSON.parse(fs.readFileSync(file, 'utf8'));
              json.version = version;
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
            }
          "

      - name: Build extension
        run: npm run build

      - name: Verify built manifest version
        run: |
          node -e "
            const manifest = require('./dist/manifest.json');
            if (manifest.version !== process.env.VERSION) {
              console.error('Expected', process.env.VERSION, 'but got', manifest.version);
              process.exit(1);
            }
          "

      - name: Zip extension
        run: |
          cd dist
          zip -r ../edge-extension-${{ env.VERSION }}.zip .

      - name: Upload ZIP to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: edge-extension-${{ env.VERSION }}.zip

      - name: Upload package to Edge draft
        id: edge_upload
        shell: bash
        run: |
          set -euo pipefail

          HEADERS=$(mktemp)
          BODY=$(mktemp)

          HTTP_STATUS=$(curl -sS -w "%{http_code}" \
            -D "$HEADERS" \
            -o "$BODY" \
            -X POST \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/zip" \
            -T "edge-extension-${{ env.VERSION }}.zip" \
            "${EDGE_API_ROOT}/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package")

          cat "$BODY"

          if [ "$HTTP_STATUS" != "202" ]; then
            echo "Edge package upload failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          OPERATION_ID=$(grep -i '^Location:' "$HEADERS" | sed 's/Location:[[:space:]]*//I' | tr -d '\r')

          if [ -z "$OPERATION_ID" ]; then
            echo "Missing Location operation ID"
            cat "$HEADERS"
            exit 1
          fi

          echo "operation_id=$OPERATION_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for package validation
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..60}; do
            RESPONSE=$(curl -sS \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "${EDGE_API_ROOT}/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package/operations/${{ steps.edge_upload.outputs.operation_id }}")

            echo "$RESPONSE"

            STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')

            if [ "$STATUS" = "Succeeded" ]; then
              exit 0
            fi

            if [ "$STATUS" = "Failed" ]; then
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for package validation"
          exit 1

      - name: Submit Edge draft for review
        id: edge_submit
        shell: bash
        run: |
          set -euo pipefail

          HEADERS=$(mktemp)
          BODY=$(mktemp)

          NOTES=$(jq -n \
            --arg notes "Automated release ${{ env.VERSION }} from GitHub release ${{ github.event.release.tag_name }}." \
            '{ notes: $notes }')

          HTTP_STATUS=$(curl -sS -w "%{http_code}" \
            -D "$HEADERS" \
            -o "$BODY" \
            -X POST \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -d "$NOTES" \
            "${EDGE_API_ROOT}/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions")

          cat "$BODY"

          if [ "$HTTP_STATUS" != "202" ]; then
            echo "Edge submission failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          OPERATION_ID=$(grep -i '^Location:' "$HEADERS" | sed 's/Location:[[:space:]]*//I' | tr -d '\r')

          if [ -z "$OPERATION_ID" ]; then
            echo "Missing Location operation ID"
            cat "$HEADERS"
            exit 1
          fi

          echo "operation_id=$OPERATION_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for submission creation
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..60}; do
            RESPONSE=$(curl -sS \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "${EDGE_API_ROOT}/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/operations/${{ steps.edge_submit.outputs.operation_id }}")

            echo "$RESPONSE"

            STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')

            if [ "$STATUS" = "Succeeded" ]; then
              echo "Edge submission created successfully."
              exit 0
            fi

            if [ "$STATUS" = "Failed" ]; then
              echo "Edge submission failed."
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Edge submission creation"
          exit 1