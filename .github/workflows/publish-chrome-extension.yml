name: Publish Chrome Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-chrome:
    name: Build, zip, cancel pending review, and submit to Chrome Web Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get Chrome Web Store access token
        id: auth
        shell: bash
        run: |
          RESPONSE=$(curl -sS "https://oauth2.googleapis.com/token" \
            -d "client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}" \
            -d "client_id=${{ secrets.GOOGLE_CLIENT_ID }}")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token"
            echo "$RESPONSE"
            exit 1
          fi

          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Check and cancel pending Chrome Web Store review
        id: review_check
        shell: bash
        run: |
          STATUS_RESPONSE=$(curl -sS \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://chromewebstore.googleapis.com/v2/publishers/${{ secrets.GOOGLE_CHROME_PUBLISHER_ID }}/items/${{ secrets.GOOGLE_CHROME_EXTENSION_ID }}:fetchStatus")

          echo "$STATUS_RESPONSE"

          SUBMITTED_STATE=$(echo "$STATUS_RESPONSE" | jq -r '.submittedItemRevisionStatus.state // empty')
          SUBMITTED_VERSION=$(echo "$STATUS_RESPONSE" | jq -r '.submittedItemRevisionStatus.distributionChannels[0].crxVersion // empty')

          if [ "$SUBMITTED_STATE" = "PENDING_REVIEW" ]; then
            echo "::notice::Chrome Web Store has version $SUBMITTED_VERSION pending review. Cancelling it before uploading the new package."

            CANCEL_RESPONSE=$(curl -sS -X POST \
              -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
              "https://chromewebstore.googleapis.com/v2/publishers/${{ secrets.GOOGLE_CHROME_PUBLISHER_ID }}/items/${{ secrets.GOOGLE_CHROME_EXTENSION_ID }}:cancelSubmission")

            echo "$CANCEL_RESPONSE"

            if echo "$CANCEL_RESPONSE" | jq -e '.error' > /dev/null; then
              echo "Failed to cancel pending Chrome Web Store review"
              exit 1
            fi
          else
            echo "No pending Chrome Web Store review found."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive version from release tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,3}$ ]]; then
            echo "Invalid Chrome extension version: $VERSION"
            echo "Use release tags like v0.1.0 or v1.2.3"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set package and manifest versions
        run: |
          node -e "
            const fs = require('fs');

            const version = process.env.VERSION;

            const files = [
              'package.json',
              'public/manifest.json'
            ];

            for (const file of files) {
              const json = JSON.parse(fs.readFileSync(file, 'utf8'));
              json.version = version;
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
              console.log(\`Set \${file} version to \${version}\`);
            }
          "

      - name: Build extension
        run: npm run build

      - name: Verify built manifest version
        run: |
          node -e "
            const manifest = require('./dist/manifest.json');

            if (manifest.version !== process.env.VERSION) {
              console.error('Expected version', process.env.VERSION, 'but got', manifest.version);
              process.exit(1);
            }

            console.log('Built manifest version:', manifest.version);
          "

      - name: Zip extension
        run: |
          cd dist
          zip -r ../chrome-extension-${{ env.VERSION }}.zip .

      - name: Upload ZIP to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: chrome-extension-${{ env.VERSION }}.zip

      - name: Upload extension to Chrome Web Store
        shell: bash
        run: |
          RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -T "chrome-extension-${{ env.VERSION }}.zip" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${{ secrets.GOOGLE_CHROME_PUBLISHER_ID }}/items/${{ secrets.GOOGLE_CHROME_EXTENSION_ID }}:upload")

          echo "$RESPONSE"

          UPLOAD_STATE=$(echo "$RESPONSE" | jq -r '.uploadState // empty')

          if [ "$UPLOAD_STATE" = "UPLOAD_STATE_UNSPECIFIED" ] || [ -z "$UPLOAD_STATE" ]; then
            echo "Upload may have failed"
            exit 1
          fi

      - name: Submit extension for review
        shell: bash
        run: |
          RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://chromewebstore.googleapis.com/v2/publishers/${{ secrets.GOOGLE_CHROME_PUBLISHER_ID }}/items/${{ secrets.GOOGLE_CHROME_EXTENSION_ID }}:publish")

          echo "$RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "Failed to submit extension for review"
            exit 1
          fi